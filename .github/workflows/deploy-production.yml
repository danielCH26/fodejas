name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g., sha-abc1234, latest)'
        required: true

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_REPOSITORY: danielch26/fodejas

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy production (placeholder)
        run: |
          echo "Deploying ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}:${{ github.event.inputs.image_tag }} to production"
          echo "NOTE: Actual deployment requires infrastructure configuration"
          echo "This workflow serves as a placeholder for deployment orchestration"
      - name: Echo deployment details
        run: |
          echo "Environment: production"
          echo "Registry: ${{ env.DOCKER_REGISTRY }}"
          echo "Repository: ${{ env.DOCKER_REPOSITORY }}"
          echo "Image: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}:${{ github.event.inputs.image_tag }}"
