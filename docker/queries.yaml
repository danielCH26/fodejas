# Custom queries for postgres_exporter
# Extends default metrics with FODEJAS-specific queries

pg_stat_database:
  query: "SELECT datname, numbackends, xact_commit, xact_rollback, blks_read, blks_hit, tup_returned, tup_fetched, tup_inserted, tup_updated, tup_deleted, conflicts, temp_files, temp_bytes, deadlocks FROM pg_stat_database"
  metrics:
    - datname:
        usage: "LABEL"
    - numbackends:
        usage: "GAUGE"
    - xact_commit:
        usage: "COUNTER"
    - xact_rollback:
        usage: "COUNTER"
    - blks_read:
        usage: "COUNTER"
    - blks_hit:
        usage: "COUNTER"
    - tup_returned:
        usage: "COUNTER"
    - tup_fetched:
        usage: "COUNTER"
    - tup_inserted:
        usage: "COUNTER"
    - tup_updated:
        usage: "COUNTER"
    - tup_deleted:
        usage: "COUNTER"
    - conflicts:
        usage: "COUNTER"
    - temp_files:
        usage: "GAUGE"
    - temp_bytes:
        usage: "GAUGE"
    - deadlocks:
        usage: "GAUGE"

pg_settings:
  query: "SELECT name, setting FROM pg_settings WHERE name IN ('max_connections', 'shared_buffers', 'effective_cache_size', 'maintenance_work_mem', 'work_mem')"
  metrics:
    - name:
        usage: "LABEL"
    - setting:
        usage: "GAUGE"
