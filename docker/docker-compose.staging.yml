services:
  app:
    image: docker.io/danielch26/fodejas:staging
    container_name: fodejas_app_staging
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-fodejas_user}:${POSTGRES_PASSWORD:-fodejas_password}@db:5432/${POSTGRES_DB:-fodejas_db}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_USE_SSL=False
      - DEBUG=False
      - DJANGO_SETTINGS_MODULE=config.settings
    restart: unless-stopped

  db:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fodejas_db}
      POSTGRES_USER: ${POSTGRES_USER:-fodejas_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fodejas_password}
    restart: unless-stopped

  redis:
    restart: unless-stopped

  minio:
    restart: unless-stopped
